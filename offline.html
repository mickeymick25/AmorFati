<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title data-i18n-key="title">Hors ligne — Amor Fati Tracker</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Arial;
        margin: 0;
        background: #f8f9fa;
        color: #222;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        max-width: 520px;
        text-align: center;
      }
      h1 {
        color: #667eea;
        margin-bottom: 8px;
      }
      p {
        color: #555;
      }
      a.button {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 16px;
        background: #667eea;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 data-i18n-key="heading">🔌 Hors ligne</h1>
      <p data-i18n-key="desc">
        Tu es hors connexion. Tu peux consulter tes dernières évaluations
        sauvegardées localement ci-dessous.
      </p>

      <div
        id="historyContainer"
        style="margin-top: 14px; text-align: left"
      ></div>

      <p style="margin-top: 12px" data-i18n-key="footer">
        Lorsque tu seras de nouveau en ligne, recharge la page pour synchroniser
        et obtenir la dernière version.
      </p>
      <a class="button" href="/" data-i18n-key="backBtn"
        >Revenir à l'application</a
      >
    </div>
    <script>
      // Offline page i18n — minimal inline dictionaries (page served by SW,
      // no access to app.js / i18next). Language read from the shared
      // localStorage key "amorFatiLang" set by i18next-browser-languagedetector.
      const OFFLINE_STRINGS = {
        fr: {
          title: "Hors ligne — Amor Fati Tracker",
          heading: "🔌 Hors ligne",
          desc: "Tu es hors connexion. Tu peux consulter tes dernières évaluations sauvegardées localement ci-dessous.",
          footer:
            "Lorsque tu seras de nouveau en ligne, recharge la page pour synchroniser et obtenir la dernière version.",
          backBtn: "Revenir à l'application",
          empty: "Aucune évaluation sauvegardée localement.",
          error: "Erreur lors de la lecture des données locales.",
          priorityPrefix: "Priorité : {{priority}}",
        },
        en: {
          title: "Offline — Amor Fati Tracker",
          heading: "🔌 Offline",
          desc: "You are offline. You can review your latest locally saved assessments below.",
          footer:
            "When you're back online, reload the page to sync and get the latest version.",
          backBtn: "Back to the app",
          empty: "No assessment saved locally.",
          error: "Error reading local data.",
          priorityPrefix: "Priority: {{priority}}",
        },
      };

      const lang = localStorage.getItem("amorFatiLang") || "fr";
      const s = OFFLINE_STRINGS[lang] || OFFLINE_STRINGS.fr;

      // Apply text to elements with data-i18n-key
      document.querySelectorAll("[data-i18n-key]").forEach((el) => {
        const key = el.getAttribute("data-i18n-key");
        if (s[key]) el.textContent = s[key];
      });
      document.documentElement.lang = lang;
      document.title = s.title;

      // Display history from localStorage (key: amorFatiData)
      function renderHistory() {
        const container = document.getElementById("historyContainer");
        container.innerHTML = "";
        try {
          const raw = localStorage.getItem("amorFatiData");
          if (
            !raw ||
            !JSON.parse(raw).assessments ||
            !JSON.parse(raw).assessments.length
          ) {
            container.innerHTML = `<p style="color:#666">${s.empty}</p>`;
            return;
          }
          const data = JSON.parse(raw);

          const list = document.createElement("div");
          list.style.display = "flex";
          list.style.flexDirection = "column";
          list.style.gap = "10px";

          const sorted = data.assessments
            .slice()
            .sort((a, b) => new Date(b.date) - new Date(a.date));
          sorted.forEach((ass) => {
            const item = document.createElement("div");
            item.style.background = "#fff";
            item.style.padding = "10px";
            item.style.borderRadius = "8px";
            item.style.boxShadow = "0 4px 12px rgba(0,0,0,0.06)";

            const d = new Date(ass.date);
            const title = document.createElement("div");
            title.style.fontWeight = "700";
            title.style.color = "#333";
            title.textContent =
              new Intl.DateTimeFormat(lang, { dateStyle: "long" }).format(d) +
              " — " +
              (ass.totalScore != null ? ass.totalScore : "N/A") +
              "/40";

            const ctx = document.createElement("div");
            ctx.style.color = "#666";
            ctx.style.fontStyle = "italic";
            ctx.style.marginTop = "6px";
            ctx.textContent = ass.context ? '"' + ass.context + '"' : "";

            item.appendChild(title);
            if (ass.priority) {
              const p = document.createElement("div");
              p.style.fontSize = "13px";
              p.style.color = "#555";
              p.style.marginTop = "6px";
              p.textContent = s.priorityPrefix.replace(
                "{{priority}}",
                ass.priority || "—",
              );
              item.appendChild(p);
            }
            item.appendChild(ctx);
            list.appendChild(item);
          });

          container.appendChild(list);
        } catch (e) {
          container.innerHTML = `<p style="color:#c00">${s.error}</p>`;
          console.error(e);
        }
      }

      renderHistory();
    </script>
  </body>
</html>
